<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的项目作品集</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            background: #0f172a;
            color: white;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            font-size: 32px;
            font-weight: bold;
            background: #020617;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
        }

        .project {
            display: flex;
            flex-wrap: wrap;
            margin: 40px 0;
            padding: 20px;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .project:hover {
            transform: translateY(-5px);
        }

        .left {
            flex: 1;
            min-width: 250px;
            padding: 20px;
        }

        .left h2 {
            margin-top: 0;
            font-size: 26px;
        }

        .left p {
            color: #cbd5f5;
            line-height: 1.6;
        }

        .right {
            flex: 2;
            min-width: 300px;
        }

        iframe {
            width: 100%;
            height: 340px;
            border-radius: 10px;
            border: none;
        }

        /* 👇 新增：封面点击播放 */
        .video-box {
            position: relative;
            cursor: pointer;
        }

        .video-box img {
            width: 100%;
            height: 340px;
            object-fit: cover;
            border-radius: 10px;
        }

        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            color: white;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            padding: 10px 20px;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #94a3b8;
        }

        @media (max-width: 768px) {
            .project {
                flex-direction: column;
            }

            iframe, .video-box img {
                height: 220px;
            }
        }
    </style>
</head>

<body>

<header>
    我的项目作品集
</header>

<div class="container">

    <!-- 项目1 -->
    <div class="project">
        <div class="left">
            <h2>🎮 Unity 游戏项目</h2>
            <p>
                一个基于 Unity 开发的游戏项目，包含角色控制、UI交互和简单的网络同步逻辑。
            </p>
        </div>
        <div class="right">
            <div class="video-box" onclick="playVideo(this, 'BV1xx411c7mD')">
                <img src="https://picsum.photos/800/450?random=1">
                <div class="play-button">▶</div>
            </div>
        </div>
    </div>

    <!-- 项目2 -->
    <div class="project">
        <div class="left">
            <h2>📊 推荐系统算法</h2>
            <p>
                使用余弦相似度与排序算法实现用户推荐，并对算法性能进行了优化分析。
            </p>
        </div>
        <div class="right">
            <div class="video-box" onclick="playVideo(this, 'BV1NkY1emEmi')">
                <img src="sit_change.webp">
                <div class="play-button">▶</div>
            </div>
        </div>
    </div>

    <!-- 项目3 -->
    <div class="project">
        <div class="left">
            <h2>🧠 PCA 图像压缩</h2>
            <p>
                使用 PCA 对人脸数据进行降维与重建，实现图像压缩与可视化分析。
            </p>
        </div>
        <div class="right">
            <div class="video-box" onclick="playVideo(this, 'BVxxxxxxxxx')">
                <img src="https://picsum.photos/800/450?random=3">
                <div class="play-button">▶</div>
            </div>
        </div>
    </div>

</div>

<footer>
    © 2026 我的名字 | GitHub Portfolio
</footer>

<!-- 👇 JS：点击后才加载视频 -->
<script>
function playVideo(element, bvid) {
    element.innerHTML = `
        <iframe 
            src="https://player.bilibili.com/player.html?bvid=${bvid}&autoplay=1"
            allowfullscreen="true">
        </iframe>
    `;
}
</script>

</body>
</html>
